name: Upptime
on:
  push:
    branches: [master]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  summary:
    name: Check uptime
    runs-on: ubuntu-latest
    steps:
      - uses: upptime/uptime-monitor@master
        with:
          UPPTIME_GH_TOKEN: ${{ secrets.GH_TOKEN }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
